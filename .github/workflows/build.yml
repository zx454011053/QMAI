name: QMAI Multi-Platform Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    env:
      CARGO_PROFILE_RELEASE_LTO: "false"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
      CARGO_PROFILE_RELEASE_OPT_LEVEL: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            runner: windows-latest
            rust_targets: ""
            tauri_args: "--bundles nsis"
            pdfium_asset: ""
            pdfium_library: ""
            artifact_globs: |
              src-tauri/target/**/release/bundle/nsis/*.exe
              src-tauri/target/**/release/bundle/nsis/*.exe.sig

          - label: macos-aarch64
            runner: macos-latest
            rust_targets: "aarch64-apple-darwin"
            tauri_args: "--target aarch64-apple-darwin --bundles dmg,app --no-sign"
            pdfium_asset: "pdfium-mac-arm64.tgz"
            pdfium_library: "libpdfium.dylib"
            artifact_globs: |
              src-tauri/target/**/release/bundle/dmg/*.dmg
              release-assets/*.app.tar.gz

          - label: macos-x64
            runner: macos-15-intel
            rust_targets: "x86_64-apple-darwin"
            tauri_args: "--target x86_64-apple-darwin --bundles dmg,app --no-sign"
            pdfium_asset: "pdfium-mac-x64.tgz"
            pdfium_library: "libpdfium.dylib"
            artifact_globs: |
              src-tauri/target/**/release/bundle/dmg/*.dmg
              release-assets/*.app.tar.gz

          - label: linux-x64
            runner: ubuntu-22.04
            rust_targets: ""
            tauri_args: "--bundles appimage,deb"
            pdfium_asset: "pdfium-linux-x64.tgz"
            pdfium_library: "libpdfium.so"
            artifact_globs: |
              src-tauri/target/**/release/bundle/appimage/*.AppImage
              src-tauri/target/**/release/bundle/deb/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with targets
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            protobuf-compiler \
            wget \
            xdg-utils

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install PDFium binary
        if: matrix.pdfium_asset != ''
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/pdfium" src-tauri/pdfium
          curl -L --fail --retry 5 --retry-delay 2 \
            -o "$RUNNER_TEMP/pdfium.tgz" \
            "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/${{ matrix.pdfium_asset }}"
          tar -xzf "$RUNNER_TEMP/pdfium.tgz" -C "$RUNNER_TEMP/pdfium"
          cp "$RUNNER_TEMP/pdfium/lib/${{ matrix.pdfium_library }}" "src-tauri/pdfium/${{ matrix.pdfium_library }}"
          ls -la src-tauri/pdfium

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'push' && github.ref_name || '' }}
          releaseName: ${{ github.event_name == 'push' && format('QMAI {0}', github.ref_name) || '' }}
          releaseBody: "QMAI multi-platform release assets."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}

      - name: Package macOS app tarball
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find src-tauri/target -path '*/release/bundle/macos/*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found"
            exit 1
          fi
          version="$(node -p "require('./package.json').version")"
          mkdir -p release-assets
          tar -C "$(dirname "$app_path")" -czf "release-assets/QMaiWrite_${version}_${{ matrix.label }}.app.tar.gz" "$(basename "$app_path")"

      - name: Attach macOS app tarball to release
        if: github.event_name == 'push' && runner.os == 'macOS'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ github.ref_name }}" release-assets/*.app.tar.gz --clobber

      - name: Upload bundles as workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: qmai-${{ matrix.label }}
          path: ${{ matrix.artifact_globs }}
          if-no-files-found: warn
          retention-days: 14
